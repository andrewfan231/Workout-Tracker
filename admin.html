<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2f80ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Workout XP" />
    <title>Admin | Overload Fitness Tracker</title>
    <meta name="description" content="A game-style fitness tracker for workouts, goals, XP rewards, streaks, and progression." />
    <meta property="og:title" content="Admin | Overload Fitness Tracker" />
    <meta property="og:description" content="A game-style fitness tracker for workouts, goals, XP rewards, streaks, and progression." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://andrewsworkouttracker.netlify.app/" />
    <meta property="og:image" content="https://andrewsworkouttracker.netlify.app/app-icon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=app-polish-43" />
  </head>
  <body>
    <main class="app-shell">
      <section class="shop-hero">
        <div>
          <p class="eyebrow">Hidden admin</p>
          <h1>Control room.</h1>
        </div>
      </section>

      <section class="panel admin-lock-panel" id="adminLockPanel">
        <div class="panel-header simple">
          <h2>Admin Unlock</h2>
          <span>local only</span>
        </div>
        <label>
          Admin code
          <input id="adminCodeInput" type="password" placeholder="Enter code" />
        </label>
        <button id="unlockAdminButton" type="button">Unlock</button>
        <p class="empty-state">This page is hidden from the app menu. For a real public site, this would need real accounts and login security.</p>
      </section>

      <section class="admin-dashboard" id="adminDashboard" hidden>
        <section class="panel">
          <div class="panel-header simple">
            <h2>Created Workouts</h2>
            <span>edit or delete</span>
          </div>
          <div id="adminWorkoutList" class="admin-workout-list"></div>
        </section>

        <section class="panel">
          <div class="panel-header simple">
            <h2>Data Tools</h2>
            <span>backup and reset</span>
          </div>
          <div class="admin-actions">
            <button id="exportAdminData" type="button">Export Data</button>
            <button id="clearCreatedWorkouts" class="delete-button" type="button">Clear Created Workouts</button>
          </div>
          <textarea id="adminDataBox" rows="8" placeholder="Exported data will show here."></textarea>
        </section>
      </section>
    </main>

    <script src="admin.js"></script>
    <script src="pwa.js?v=app-polish-43"></script>
  </body>
</html>
